<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
	<meta name="mobile-web-app-capable" content="yes">
	<meta name="apple-mobile-web-app-capable" content="yes">
	<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
	<meta name="theme-color" content="#0a0e1a">
	<meta name="screen-orientation" content="landscape">
	<title>$GODOT_PROJECT_NAME</title>
	<script>
		/* 本地试玩：禁用 SW 缓存，避免 index.pck 不更新 */
		(function () {
			var h = location.hostname;
			var local = h === 'localhost' || h === '127.0.0.1' || /^10\./.test(h) || /^192\.168\./.test(h);
			if (!local) return;
			window.__SS_DEV_LOCAL__ = true;
			if ('serviceWorker' in navigator) {
				navigator.serviceWorker.getRegistrations().then(function (regs) {
					regs.forEach(function (r) { r.unregister(); });
				});
			}
			if ('caches' in window) {
				caches.keys().then(function (keys) {
					keys.forEach(function (k) { caches.delete(k); });
				});
			}
		}());
	</script>
	<style>
		html, body {
			margin: 0;
			padding: 0;
			width: 100%;
			height: 100%;
			overflow: hidden;
			background: #0a0e1a;
			touch-action: none;
			-webkit-touch-callout: none;
			-webkit-user-select: none;
			user-select: none;
		}
		#game-viewport {
			position: fixed;
			left: 50%;
			top: 50%;
			transform: translate(-50%, -50%);
			transform-origin: center center;
			box-sizing: border-box;
			overflow: hidden;
		}
		#game-shell {
			position: relative;
			width: 100%;
			height: 100%;
			overflow: visible;
			box-sizing: border-box;
		}
		#canvas {
			display: block;
			width: 100% !important;
			height: 100% !important;
			outline: none;
		}
		#scale-controls {
			position: fixed;
			right: 12px;
			bottom: 12px;
			z-index: 10;
			display: flex;
			gap: 6px;
			padding: 6px 8px;
			border-radius: 8px;
			background: rgba(8, 12, 22, 0.92);
			border: 1px solid rgba(90, 110, 150, 0.45);
			font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
			pointer-events: auto;
		}
		@media (pointer: coarse) {
			#scale-controls {
				display: none !important;
			}
		}
		#scale-controls span {
			color: #9eb4d8;
			font-size: 12px;
			line-height: 28px;
			margin-right: 2px;
		}
		#scale-controls button {
			min-width: 44px;
			height: 28px;
			padding: 0 8px;
			border: 1px solid rgba(90, 110, 150, 0.5);
			border-radius: 6px;
			background: rgba(20, 28, 44, 0.9);
			color: #d8e6ff;
			font-size: 12px;
			cursor: pointer;
		}
		#scale-controls button:hover {
			background: rgba(32, 48, 72, 0.95);
		}
		#scale-controls button.active {
			background: rgba(48, 88, 130, 0.95);
			border-color: rgba(120, 180, 230, 0.75);
			color: #ffffff;
		}
		#status-overlay {
			position: fixed;
			inset: 0;
			z-index: 2;
			display: flex;
			flex-direction: column;
			justify-content: center;
			align-items: center;
			background-color: $GODOT_SPLASH_COLOR;
			pointer-events: none;
		}
		#status-splash {
			max-height: 40%;
			max-width: 60%;
			margin-bottom: 1rem;
		}
		#status-splash.show-image--false {
			display: none;
		}
		#status-splash.fullsize--true {
			height: 100%;
			width: 100%;
			object-fit: contain;
		}
		#status-splash.use-filter--false {
			image-rendering: pixelated;
		}
		#status-text, #status-notice {
			text-align: center;
			font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
			color: #d8e6ff;
		}
		#status-text {
			font-size: 14px;
			margin-bottom: 8px;
		}
		#status-progress {
			width: 50%;
			max-width: 320px;
			height: 6px;
		}
		#status-notice {
			position: fixed;
			bottom: 16px;
			left: 0;
			right: 0;
			font-size: 12px;
			opacity: 0.8;
		}
		#status-error {
			display: none;
			max-width: 80%;
			padding: 1rem;
			border-radius: 0.5rem;
			background: #5b3943;
			border: 1px solid #9b3943;
			color: #e0e0e0;
			font-size: 13px;
			line-height: 1.4;
			white-space: pre-wrap;
		}
		#rotate-hint {
			position: fixed;
			inset: 0;
			z-index: 9999;
			display: none;
			flex-direction: column;
			justify-content: center;
			align-items: center;
			gap: 14px;
			padding: 28px;
			background: rgba(6, 10, 18, 0.96);
			color: #d8e6ff;
			text-align: center;
			font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
			pointer-events: auto;
		}
		#rotate-hint.show {
			display: flex;
		}
		#rotate-hint .rotate-icon {
			font-size: 56px;
			line-height: 1;
			animation: rotate-hint-wiggle 1.4s ease-in-out infinite;
		}
		#rotate-hint p {
			margin: 0;
			font-size: 18px;
			font-weight: 600;
		}
		#rotate-hint small {
			opacity: 0.75;
			font-size: 13px;
			line-height: 1.5;
		}
		#rotate-hint .rotate-actions {
			display: flex;
			flex-direction: column;
			gap: 10px;
			width: min(280px, 88vw);
			margin-top: 6px;
			pointer-events: auto;
		}
		#rotate-hint button {
			min-height: 48px;
			padding: 12px 18px;
			border-radius: 10px;
			border: 1px solid rgba(120, 180, 230, 0.55);
			background: rgba(32, 56, 88, 0.95);
			color: #ffffff;
			font-size: 16px;
			font-weight: 600;
			cursor: pointer;
		}
		#rotate-hint button.primary {
			background: rgba(48, 104, 168, 0.98);
			border-color: rgba(140, 200, 255, 0.8);
		}
		#rotate-hint.banner-mode {
			justify-content: flex-start;
			padding-top: 20px;
			background: rgba(6, 10, 18, 0.72);
			pointer-events: none;
		}
		#rotate-hint.banner-mode .rotate-hint-panel {
			pointer-events: auto;
			gap: 10px;
		}
		#rotate-hint.banner-mode .rotate-icon {
			font-size: 32px;
		}
		#rotate-hint.banner-mode p {
			font-size: 15px;
		}
		@keyframes rotate-hint-wiggle {
			0%, 100% { transform: rotate(-12deg); }
			50% { transform: rotate(12deg); }
		}
	</style>
	$GODOT_HEAD_INCLUDE
</head>
<body>
	<div id="game-viewport">
		<div id="game-shell">
			<canvas id="canvas">
				您的浏览器不支持 canvas。
			</canvas>
		</div>
	</div>
	<div id="scale-controls">
		<span>显示</span>
		<button type="button" data-scale="0.5">50%</button>
		<button type="button" data-scale="0.75" class="active">75%</button>
		<button type="button" data-scale="1">100%</button>
	</div>
	<div id="status-overlay">
		<img id="status-splash" src="$GODOT_SPLASH" class="$GODOT_SPLASH_CLASSES" alt="">
		<div id="status-text">加载中… 首次打开可能需等待 10–30 秒</div>
		<progress id="status-progress" value="0" max="100"></progress>
		<div id="status-error"></div>
	</div>
	<div id="status-notice">横屏游玩 · 左下摇杆移动 · 右上冲刺/暂停 · 右下按住激光</div>
	<div id="rotate-hint" aria-live="polite">
		<div class="rotate-hint-panel" style="display:flex;flex-direction:column;align-items:center;gap:14px;">
			<div class="rotate-icon" aria-hidden="true">📱</div>
			<p>请旋转手机至横屏</p>
			<small>Shell Survivor 为横屏游戏<br>旋转横屏立即开始，或 2 秒后自动进入</small>
			<div class="rotate-actions">
				<button type="button" id="rotate-landscape-btn" class="primary">我已横屏，全屏继续</button>
				<button type="button" id="rotate-start-btn">竖屏先进入（摇杆不可用）</button>
			</div>
		</div>
	</div>
	<script src="$GODOT_URL"></script>
	<script>
		const GODOT_CONFIG = $GODOT_CONFIG;
		const GODOT_THREADS_ENABLED = $GODOT_THREADS_ENABLED;
		const engine = new Engine(GODOT_CONFIG);
		const DESIGN_W = 1920;
		const DESIGN_H = 1080;
		const SCALE_KEY = 'shell_survivor_display_scale';
		let displayScale = 0.75;
		let gameStarted = false;
		let gameStarting = false;
		let landscapeWaitTimer = null;
		let mobileBootTimer = null;
		let mobileBootScheduled = false;
		let userForceLandscape = false;
		let lastOrientationAngle = null;

		function isCoarseMobile() {
			return window.matchMedia('(pointer: coarse)').matches;
		}

		function getOrientationAngle() {
			const o = screen.orientation;
			if (o && typeof o.angle === 'number') {
				return o.angle;
			}
			if (typeof window.orientation === 'number') {
				return window.orientation;
			}
			return null;
		}

		function isLandscapeByAngle() {
			const angle = getOrientationAngle();
			if (angle == null) {
				return null;
			}
			return angle === 90 || angle === 270 || angle === -90;
		}

		function getViewportSize() {
			const vv = window.visualViewport;
			let w = Math.max(1, Math.floor(vv ? vv.width : window.innerWidth));
			let h = Math.max(1, Math.floor(vv ? vv.height : window.innerHeight));
			const landscapeByAngle = isLandscapeByAngle();
			if ((landscapeByAngle === true || userForceLandscape) && w < h) {
				const tmp = w;
				w = h;
				h = tmp;
			}
			return { w: w, h: h };
		}

		function isLandscapeViewport() {
			if (userForceLandscape) {
				return true;
			}
			const byAngle = isLandscapeByAngle();
			if (byAngle === true) {
				return true;
			}
			try {
				if (window.matchMedia && window.matchMedia('(orientation: landscape)').matches) {
					return true;
				}
			} catch (err) { /* ignore */ }
			const o = screen.orientation;
			if (o && o.type && o.type.indexOf('landscape') === 0) {
				return true;
			}
			if (window.screen && window.screen.width > window.screen.height) {
				return true;
			}
			const vp = getViewportSize();
			return vp.w >= vp.h;
		}

		function isPortraitViewport() {
			return !isLandscapeViewport();
		}

		function shouldShowRotateHint() {
			return isCoarseMobile() && isPortraitViewport();
		}

		function clearMobileBootTimers() {
			if (landscapeWaitTimer != null) {
				window.clearInterval(landscapeWaitTimer);
				landscapeWaitTimer = null;
			}
			if (mobileBootTimer != null) {
				window.clearTimeout(mobileBootTimer);
				mobileBootTimer = null;
			}
		}

		function hideRotateHint() {
			const hint = document.getElementById('rotate-hint');
			if (hint) {
				hint.classList.remove('show');
				hint.classList.remove('banner-mode');
			}
		}

		function applyForceLandscape() {
			userForceLandscape = true;
			hideRotateHint();
			tryLockLandscape();
			scheduleLayoutBurst();
			if (gameStarted) {
				tryEnterPlayMode();
			} else if (!gameStarting) {
				bootMobileGame(true);
			}
		}

		function bootMobileGame(force) {
			if (gameStarted || gameStarting) {
				return;
			}
			clearMobileBootTimers();
			hideRotateHint();
			tryLockLandscape();
			layoutCanvas();
			startGameIfReady();
		}

		function updatePortraitGuard() {
			const hint = document.getElementById('rotate-hint');
			if (!isCoarseMobile()) {
				hideRotateHint();
				layoutCanvas();
				return;
			}
			if (isLandscapeViewport()) {
				hideRotateHint();
				layoutCanvas();
				if (!gameStarted && !gameStarting) {
					bootMobileGame(false);
				} else if (gameStarted) {
					tryLockLandscape();
					scheduleLayoutBurst();
				}
				return;
			}
			if (!hint) {
				layoutCanvas();
				return;
			}
			if (!gameStarted) {
				hint.classList.add('show');
				hint.classList.remove('banner-mode');
				const title = hint.querySelector('p');
				const small = hint.querySelector('small');
				if (title) title.textContent = '请旋转手机至横屏';
				if (small) small.innerHTML = 'Shell Survivor 为横屏游戏<br>旋转横屏立即开始，或点下方按钮';
				layoutCanvas();
				return;
			}
			hint.classList.add('show');
			hint.classList.add('banner-mode');
			const title = hint.querySelector('p');
			const small = hint.querySelector('small');
			if (title) title.textContent = '建议横屏游玩';
			if (small) small.innerHTML = '竖屏摇杆不可用。若已横屏请点「全屏继续」';
			layoutCanvas();
		}

		function updateRotateHintMessage() {
			const hint = document.getElementById('rotate-hint');
			if (!hint) return;
			const small = hint.querySelector('small');
			if (!small) return;
			if (isLandscapeViewport()) {
				small.innerHTML = 'Shell Survivor 为横屏游戏<br>正在启动…';
			} else {
				small.innerHTML = 'Shell Survivor 为横屏游戏<br>旋转横屏立即开始，或 2 秒后自动进入';
			}
		}

		function tryStartWhenLandscapeReady() {
			if (gameStarted || gameStarting) {
				return;
			}
			if (isCoarseMobile() && isPortraitViewport()) {
				updatePortraitGuard();
				return;
			}
			bootMobileGame(false);
		}

		function showRotateHintAndScheduleStart() {
			if (!isCoarseMobile()) {
				tryStartWhenLandscapeReady();
				return;
			}
			if (mobileBootScheduled) {
				updatePortraitGuard();
				return;
			}
			mobileBootScheduled = true;
			const hint = document.getElementById('rotate-hint');
			if (hint) hint.classList.add('show');
			updateRotateHintMessage();
			landscapeWaitTimer = window.setInterval(function () {
				updateRotateHintMessage();
				if (isLandscapeViewport()) {
					bootMobileGame(false);
				}
			}, 200);
			mobileBootTimer = window.setTimeout(function () {
				if (!gameStarted && !gameStarting) {
					const small = hint ? hint.querySelector('small') : null;
					if (small) small.innerHTML = '正在加载游戏…';
					bootMobileGame(true);
				}
			}, 2000);
			if (isLandscapeViewport()) {
				bootMobileGame(false);
			}
		}

		async function tryLockLandscape() {
			try {
				const o = screen.orientation;
				if (o && typeof o.lock === 'function') {
					await o.lock('landscape-primary');
				}
			} catch (err) {
				/* 部分浏览器需全屏或 PWA 才允许锁定，忽略即可 */
			}
		}

		function bindResizeWatchers() {
			function relayout() {
				const angle = getOrientationAngle();
				if (angle != null && angle !== lastOrientationAngle) {
					lastOrientationAngle = angle;
					if (isLandscapeByAngle() === true) {
						userForceLandscape = false;
					}
				}
				if (isCoarseMobile()) {
					updatePortraitGuard();
					return;
				}
				hideRotateHint();
				scheduleLayoutBurst();
			}
			window.addEventListener('resize', relayout);
			window.addEventListener('orientationchange', function () {
				setTimeout(relayout, 50);
				setTimeout(relayout, 150);
				setTimeout(relayout, 400);
				setTimeout(relayout, 800);
			});
			if (screen.orientation && screen.orientation.addEventListener) {
				screen.orientation.addEventListener('change', function () {
					setTimeout(relayout, 50);
					setTimeout(relayout, 300);
				});
			}
			if (window.visualViewport) {
				window.visualViewport.addEventListener('resize', relayout);
				window.visualViewport.addEventListener('scroll', relayout);
			}
			try {
				const mql = window.matchMedia('(orientation: landscape)');
				if (mql && mql.addEventListener) {
					mql.addEventListener('change', function () {
						setTimeout(relayout, 50);
					});
				} else if (mql && mql.addListener) {
					mql.addListener(function () {
						setTimeout(relayout, 50);
					});
				}
			} catch (err) { /* ignore */ }
			if (isCoarseMobile()) {
				window.setInterval(function () {
					const angle = getOrientationAngle();
					if (angle == null) {
						return;
					}
					if (angle !== lastOrientationAngle) {
						lastOrientationAngle = angle;
						relayout();
					} else if (isLandscapeByAngle() === true && !userForceLandscape) {
						relayout();
					}
				}, 150);
			}
		}

		function bindRotateHintButtons() {
			const startBtn = document.getElementById('rotate-start-btn');
			const landscapeBtn = document.getElementById('rotate-landscape-btn');
			if (startBtn) {
				startBtn.addEventListener('click', function (ev) {
					ev.preventDefault();
					ev.stopPropagation();
					bootMobileGame(true);
				});
			}
			if (landscapeBtn) {
				landscapeBtn.addEventListener('click', function (ev) {
					ev.preventDefault();
					ev.stopPropagation();
					applyForceLandscape();
				});
			}
		}

		function loadDisplayScale() {
			if (isCoarseMobile()) {
				displayScale = 1;
				return;
			}
			const saved = localStorage.getItem(SCALE_KEY);
			if (saved === '0.5' || saved === '0.75' || saved === '1') {
				displayScale = Number(saved);
				return;
			}
		}

		function saveDisplayScale() {
			if (isCoarseMobile()) return;
			localStorage.setItem(SCALE_KEY, String(displayScale));
		}

		function updateScaleButtons() {
			if (isCoarseMobile()) return;
			document.querySelectorAll('#scale-controls button[data-scale]').forEach(function (btn) {
				const v = Number(btn.getAttribute('data-scale'));
				btn.classList.toggle('active', Math.abs(v - displayScale) < 0.001);
			});
		}

		function computeDisplaySize() {
			const vp = getViewportSize();
			const vw = vp.w;
			const vh = vp.h;

			if (isCoarseMobile()) {
				if (isLandscapeViewport()) {
					return {
						mode: 'landscape-full',
						dw: vw,
						dh: vh,
						transform: 'none',
					};
				}
				let dw = vw;
				let dh = Math.max(1, Math.floor(vw * DESIGN_H / DESIGN_W));
				if (dh > vh - 16) {
					dh = Math.max(1, vh - 16);
					dw = Math.max(1, Math.floor(dh * DESIGN_W / DESIGN_H));
				}
				return {
					mode: 'portrait-letterbox',
					dw: dw,
					dh: dh,
					transform: 'translate(-50%, -50%)',
				};
			}

			const fit100 = Math.min(vw / DESIGN_W, vh / DESIGN_H);
			const uniform = fit100 * displayScale;
			return {
				mode: 'desktop',
				dw: Math.max(1, Math.floor(DESIGN_W * uniform)),
				dh: Math.max(1, Math.floor(DESIGN_H * uniform)),
				transform: 'translate(-50%, -50%)',
			};
		}

		function layoutCanvas() {
			const viewport = document.getElementById('game-viewport');
			const shell = document.getElementById('game-shell');
			const canvas = document.getElementById('canvas');
			if (!viewport || !shell || !canvas) return;

			const size = computeDisplaySize();
			if (size.mode === 'landscape-full') {
				viewport.style.left = '0';
				viewport.style.top = '0';
				viewport.style.width = '100%';
				viewport.style.height = '100%';
				viewport.style.transform = 'none';
			} else {
				viewport.style.left = '50%';
				viewport.style.top = '50%';
				viewport.style.width = size.dw + 'px';
				viewport.style.height = size.dh + 'px';
				viewport.style.transform = size.transform;
			}
			shell.style.width = '100%';
			shell.style.height = '100%';
			canvas.style.width = '100%';
			canvas.style.height = '100%';
			canvas.style.display = 'block';
			viewport.style.visibility = (isCoarseMobile() && isPortraitViewport() && !gameStarted) ? 'hidden' : 'visible';
		}

		async function tryEnterPlayMode() {
			await tryLockLandscape();
			try {
				const root = document.documentElement;
				if (root.requestFullscreen && !document.fullscreenElement) {
					await root.requestFullscreen({ navigationUI: 'hide' });
					await tryLockLandscape();
				}
			} catch (err) {
				/* 浏览器可能拒绝全屏，忽略 */
			}
		}

		function scheduleLayoutBurst() {
			layoutCanvas();
			[0, 16, 50, 120, 300].forEach(function (ms) {
				setTimeout(layoutCanvas, ms);
			});
		}

		function setDisplayScale(next) {
			displayScale = next;
			saveDisplayScale();
			updateScaleButtons();
			layoutCanvas();
		}

		function bindLayoutWatchers() {
			const canvas = document.getElementById('canvas');
			if (!canvas) return;
			if (typeof ResizeObserver !== 'undefined') {
				const ro = new ResizeObserver(function () {
					scheduleLayoutBurst();
				});
				ro.observe(canvas);
			}
			window.addEventListener('resize', layoutCanvas);
		}

		loadDisplayScale();
		updateScaleButtons();
		layoutCanvas();
		bindLayoutWatchers();

		document.addEventListener('touchstart', function () {
			const canvas = document.getElementById('canvas');
			if (canvas && typeof canvas.focus === 'function') {
				canvas.focus({ preventScroll: true });
			}
			if (isCoarseMobile() && gameStarted && isLandscapeViewport()) {
				tryEnterPlayMode();
			}
		}, { passive: true, capture: true });

		document.querySelectorAll('#scale-controls button[data-scale]').forEach(function (btn) {
			btn.addEventListener('click', function () {
				setDisplayScale(Number(btn.getAttribute('data-scale')));
			});
		});

		(function () {
			const overlay = document.getElementById('status-overlay');
			const statusText = document.getElementById('status-text');
			const statusProgress = document.getElementById('status-progress');
			const statusError = document.getElementById('status-error');
			const statusNotice = document.getElementById('status-notice');

			function hideOverlay() {
				overlay.remove();
				statusNotice.remove();
				scheduleLayoutBurst();
			}

			function showError(text) {
				statusText.style.display = 'none';
				statusProgress.style.display = 'none';
				statusError.style.display = 'block';
				statusError.textContent = text;
			}

			window.startGameIfReady = function () {
				if (gameStarted || gameStarting) {
					return;
				}
				gameStarting = true;

				const missing = Engine.getMissingFeatures({
					threads: GODOT_THREADS_ENABLED,
				});

				if (missing.length !== 0) {
					gameStarting = false;
					showError('浏览器缺少 Web 运行所需功能：\n' + missing.join('\n'));
					return;
				}

				layoutCanvas();

				engine.startGame({
					canvasResizePolicy: isCoarseMobile() ? 2 : 1,
					onProgress: function (current, total) {
						if (current > 0 && total > 0) {
							const pct = Math.round((current / total) * 100);
							statusText.textContent = '加载中… ' + pct + '%';
							statusProgress.value = current;
							statusProgress.max = total;
						}
					},
				}).then(function () {
					gameStarted = true;
					gameStarting = false;
					hideOverlay();
					if (isCoarseMobile() && isLandscapeViewport()) {
						tryEnterPlayMode();
					}
					updatePortraitGuard();
				}, function (err) {
					gameStarting = false;
					console.error(err);
					const msg = (err && err.message) ? err.message : String(err || '未知错误');
					showError('加载失败：\n' + msg);
				});
			};
		}());

		bindResizeWatchers();
		bindRotateHintButtons();
		showRotateHintAndScheduleStart();
	</script>

</body>
