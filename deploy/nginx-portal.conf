# 多项目门户：www.sbhigakf215dadjwahi.xyz
#
# 目录结构（服务器 /var/www/portal/）：
#   index.html          ← deploy/portal/ 门户首页（选项目）
#   portal.css
#   portal.js
#   projects.json       ← 新增项目只改这个文件
#   story/              ← OUR STORY（从根路径迁到子目录）
#   game/               ← Shell Survivor Web 导出
#   other/              ← 未来项目…
#
# 访问：
#   https://www.sbhigakf215dadjwahi.xyz/         门户
#   https://www.sbhigakf215dadjwahi.xyz/story/   OUR STORY
#   https://www.sbhigakf215dadjwahi.xyz/game/    游戏

server {
    listen 80;
    listen [::]:80;
    server_name www.sbhigakf215dadjwahi.xyz sbhigakf215dadjwahi.xyz;

    root /var/www/portal;
    index index.html;

    # HTTPS：certbot --nginx -d www.sbhigakf215dadjwahi.xyz -d sbhigakf215dadjwahi.xyz

    # 门户首页
    location = / {
        try_files /index.html =404;
    }

    location = /projects.json {
        add_header Cache-Control "no-store";
    }

    # OUR STORY（静态站或 SPA 构建产物放在 story/ 目录）
    location /story/ {
        alias /var/www/portal/story/;
        try_files $uri $uri/ /story/index.html;
    }

    # Shell Survivor（Godot Web 导出到 game/）
    location /game/ {
        alias /var/www/portal/game/;
        try_files $uri $uri/ /game/index.html;
    }

    # Godot Web 必需 MIME
    types {
        application/wasm wasm;
        application/javascript js;
        application/octet-stream pck;
    }

    location ~* \.(wasm|pck|js|png|webp|ogg|woff2|css|json)$ {
        expires 3d;
        add_header Cache-Control "public";
    }

    # 若 OUR STORY 是 Node 后端而非静态文件，改用反向代理：
    # location /story/ {
    #     proxy_pass http://127.0.0.1:3000/;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    # }

    # 根域名统一跳 www（可选）
    if ($host = sbhigakf215dadjwahi.xyz) {
        return 301 https://www.sbhigakf215dadjwahi.xyz$request_uri;
    }
}
