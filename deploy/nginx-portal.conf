# 作品集门户 — www.sbhigakf215dadjwahi.xyz
#
# 服务器目录 /var/www/portal/：
#   index.html, portal.css, portal.js, projects.json  ← portfolio/
#   story/   ← OUR STORY
#   game/    ← Shell Survivor Web 导出
#   muse/    ← Creative Muse（Node 静态 + API 代理）
#   housing/ ← 郑州房价预测（FastAPI 反向代理）

server {
    listen 80;
    listen [::]:80;
    server_name www.sbhigakf215dadjwahi.xyz sbhigakf215dadjwahi.xyz;

    root /var/www/portal;
    index index.html;

    location = / {
        try_files /index.html =404;
    }

    location = /projects.json {
        add_header Cache-Control "no-store";
    }

    location /story/ {
        alias /var/www/portal/story/;
        try_files $uri $uri/ /story/index.html;
    }

    location /game/ {
        alias /var/www/portal/game/;
        try_files $uri $uri/ /game/index.html;
    }

    location /muse/ {
        alias /var/www/portal/muse/;
        try_files $uri $uri/ /muse/index.html;
    }

    location /muse/api/ {
        proxy_pass http://127.0.0.1:3001/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /housing/ {
        proxy_pass http://127.0.0.1:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    gzip on;
    gzip_types application/wasm application/javascript application/octet-stream text/css application/json;
    gzip_min_length 1024;

    types {
        application/wasm wasm;
        application/javascript js;
        application/octet-stream pck;
    }

    location ~* \.(wasm|pck|js|png|webp|ogg|woff2|css|json)$ {
        expires 3d;
        add_header Cache-Control "public";
    }

    if ($host = sbhigakf215dadjwahi.xyz) {
        return 301 https://www.sbhigakf215dadjwahi.xyz$request_uri;
    }
}
