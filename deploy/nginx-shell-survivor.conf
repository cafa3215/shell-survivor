# Nginx：Godot Web 静态托管（手机浏览器可玩）
# 用法示例：
#   1) 导出到 build/web/
#   2) 上传到服务器 /var/www/shell-survivor/
#   3) include 本文件，或复制 server 块

# === 方案 A：子域名（推荐，不影响现有 www 站点）===
# game.sbhigakf215dadjwahi.xyz → 纯游戏
server {
    listen 80;
    listen [::]:80;
    server_name game.sbhigakf215dadjwahi.xyz;

    root /var/www/shell-survivor;
    index index.html;

    # 建议用 certbot 自动 HTTPS：certbot --nginx -d game.sbhigakf215dadjwahi.xyz
    # listen 443 ssl http2;
    # ssl_certificate ...;
    # ssl_certificate_key ...;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Godot Web 必需 MIME
    types {
        application/wasm wasm;
        application/javascript js;
        application/octet-stream pck;
    }

    # 静态资源缓存（wasm/pck 带 hash 时可长期缓存）
    location ~* \.(wasm|pck|js|png|webp|ogg|woff2)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # 手机横屏、全屏体验
    add_header X-Frame-Options "SAMEORIGIN" always;
}

